<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モンスターTCG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f1923;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ===== カード ===== */
.card {
  width: 68px;
  height: 96px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  font-size: 10px;
  text-align: center;
  padding: 4px;
  position: relative;
  flex-shrink: 0;
}
.card:hover { transform: translateY(-8px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
.card.selected {
  border-color: #FFD700;
  box-shadow: 0 0 18px #FFD700;
  transform: translateY(-12px);
}
.card.can-attack {
  border-color: #ff4444;
  box-shadow: 0 0 12px #ff4444;
  animation: pulse-red 1.2s infinite;
}
.card.face-down {
  background: linear-gradient(135deg, #1a3a6e, #0d2040) !important;
  border-color: #2a5a9e;
  cursor: default;
}
.card.face-down:hover { transform: none; }
.card.cpu-target { border-color: #ff8800; box-shadow: 0 0 14px #ff8800; }

@keyframes pulse-red {
  0%,100% { box-shadow: 0 0 8px #ff4444; }
  50% { box-shadow: 0 0 20px #ff4444; }
}

.card-cost {
  position: absolute;
  top: 3px; right: 4px;
  font-size: 9px;
  color: #a0c4ff;
  font-weight: bold;
}
.card-name { font-weight: bold; font-size: 9px; line-height: 1.2; margin-bottom: 4px; }
.card-atk { font-size: 15px; font-weight: bold; color: #FFD700; }
.card-atk-label { font-size: 8px; color: #aaa; }
.card-back-icon { font-size: 28px; }

/* ===== ゾーン ===== */
.zone {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  border-radius: 8px;
  flex-wrap: wrap;
  align-items: center;
  min-height: 110px;
  flex: 1;
}
.zone.battlefield {
  background: rgba(0, 120, 60, 0.2);
  border: 1px dashed rgba(0,200,100,0.25);
  min-height: 116px;
}
.zone.mana-zone {
  background: rgba(20, 60, 160, 0.2);
  border: 1px dashed rgba(80,140,255,0.25);
  min-height: 72px;
}
.zone.hand-zone {
  background: rgba(80, 0, 120, 0.2);
  border: 1px dashed rgba(160,80,255,0.25);
  min-height: 110px;
  overflow-x: auto;
  flex-wrap: nowrap;
}
.zone-empty { color: #444; font-size: 11px; padding: 4px; }

/* ===== レイアウト ===== */
#app { display: flex; flex-direction: column; height: 100vh; }

.player-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 6px 8px;
  min-height: 0;
}

.zone-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.zone-label {
  width: 56px;
  font-size: 10px;
  color: #666;
  padding-top: 10px;
  flex-shrink: 0;
  text-align: right;
}

.area-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 0;
}
.player-label { font-weight: bold; font-size: 13px; }
.cpu-label { color: #ff8888; }
.you-label { color: #88ff88; }
.stats { font-size: 11px; color: #666; display: flex; gap: 10px; }

/* ===== 情報バー ===== */
#game-info {
  background: #0c1420;
  border-top: 1px solid #1e3050;
  border-bottom: 1px solid #1e3050;
  padding: 6px 12px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}

#phase-display {
  font-size: 12px;
  color: #aaa;
  white-space: nowrap;
}

.phase-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: bold;
  margin-left: 6px;
}
.badge-main { background: #1a4a1a; color: #7fff7f; }
.badge-battle { background: #4a1a1a; color: #ff7f7f; }
.badge-cpu { background: #3a3a1a; color: #ffff7f; }

#game-log {
  flex: 1;
  background: #080d14;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px;
  color: #aaa;
  height: 48px;
  overflow-y: auto;
}
#game-log div { line-height: 1.5; }

#buttons { display: flex; gap: 6px; flex-shrink: 0; }

.btn {
  padding: 5px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  transition: opacity 0.2s, transform 0.1s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.btn-mana   { background: #1a3a7a; color: #88aaff; border: 1px solid #2a5aaa; }
.btn-summon { background: #1a5a1a; color: #88ff88; border: 1px solid #2a8a2a; }
.btn-battle { background: #5a1a1a; color: #ff8888; border: 1px solid #8a2a2a; }
.btn-end    { background: #3a3a3a; color: #ccc;    border: 1px solid #555; }

/* ===== ダイバイダー ===== */
.divider {
  height: 1px;
  background: linear-gradient(to right, transparent, #1e3050, transparent);
  margin: 0 8px;
}

/* ===== オーバーレイ ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.result-box {
  background: #0c1420;
  border: 2px solid #FFD700;
  padding: 40px 60px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,215,0,0.3);
}
.result-box h2 { font-size: 32px; margin-bottom: 8px; }
.result-box p  { color: #888; margin-bottom: 24px; }
.btn-retry { background: #FFD700; color: #000; font-size: 15px; padding: 10px 30px; }

/* ===== 開始オーバーレイ ===== */
.start-overlay {
  position: fixed;
  inset: 0;
  background: #0f1923;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.start-box {
  text-align: center;
}
.start-box h1 { font-size: 40px; color: #FFD700; margin-bottom: 12px; }
.start-box p  { color: #888; margin-bottom: 8px; font-size: 13px; line-height: 1.8; }
.btn-start { background: #FFD700; color: #000; font-size: 18px; padding: 12px 40px; margin-top: 24px; }

/* ===== ターンアニメーション ===== */
#turn-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  border: 2px solid #FFD700;
  padding: 16px 40px;
  border-radius: 12px;
  font-size: 22px;
  font-weight: bold;
  color: #FFD700;
  z-index: 50;
  display: none;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- 開始画面 -->
<div class="start-overlay" id="start-overlay">
  <div class="start-box">
    <h1>⚔️ モンスターTCG</h1>
    <p>
      山札40枚 | 手札5枚スタート | 毎ターン1ドロー<br>
      💎 カードをマナにセットしてモンスターを召喚<br>
      ⚔️ 攻撃力の高いモンスターが勝利<br>
      🏆 相手の戦場のモンスターをゼロにしたら勝ち！
    </p>
    <button class="btn btn-start" onclick="startGame()">ゲーム開始</button>
  </div>
</div>

<!-- ターンバナー -->
<div id="turn-banner"></div>

<!-- ゲーム結果 -->
<div class="overlay" id="overlay" style="display:none">
  <div class="result-box">
    <h2 id="result-text"></h2>
    <p id="result-sub"></p>
    <button class="btn btn-retry" onclick="startGame()">もう一度プレイ</button>
  </div>
</div>

<!-- メインゲーム画面 -->
<div id="app">

  <!-- CPU エリア -->
  <div class="player-area" id="cpu-area">
    <div class="area-header">
      <span class="player-label cpu-label">🤖 CPU</span>
      <div class="stats">
        <span>📚 <span id="cpu-deck-count">0</span></span>
        <span>🪦 <span id="cpu-grave-count">0</span></span>
        <span>💎 <span id="cpu-mana-count">0</span>/<span id="cpu-mana-total">0</span></span>
      </div>
    </div>
    <div class="zone-row">
      <div class="zone-label">手札</div>
      <div class="zone hand-zone" id="cpu-hand"></div>
    </div>
    <div class="zone-row">
      <div class="zone-label">マナ</div>
      <div class="zone mana-zone" id="cpu-mana"></div>
    </div>
    <div class="zone-row">
      <div class="zone-label">戦場</div>
      <div class="zone battlefield" id="cpu-battlefield"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 情報バー -->
  <div id="game-info">
    <div id="phase-display">ターン 1</div>
    <div id="game-log"><div>ゲーム開始！</div></div>
    <div id="buttons">
      <button class="btn btn-mana"   id="btn-mana"   onclick="doSetMana()"   disabled>💎 マナにセット</button>
      <button class="btn btn-summon" id="btn-summon" onclick="doSummon()"    disabled>✨ 召喚</button>
      <button class="btn btn-battle" id="btn-battle" onclick="doBattlePhase()" disabled>⚔️ 攻撃フェーズへ</button>
      <button class="btn btn-end"    id="btn-end"    onclick="doEndTurn()"   disabled>⏭ ターン終了</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- プレイヤーエリア -->
  <div class="player-area" id="player-area">
    <div class="zone-row">
      <div class="zone-label">戦場</div>
      <div class="zone battlefield" id="player-battlefield"></div>
    </div>
    <div class="zone-row">
      <div class="zone-label">マナ</div>
      <div class="zone mana-zone" id="player-mana"></div>
    </div>
    <div class="zone-row">
      <div class="zone-label">手札</div>
      <div class="zone hand-zone" id="player-hand"></div>
    </div>
    <div class="area-header">
      <span class="player-label you-label">🧙 あなた</span>
      <div class="stats">
        <span>📚 <span id="player-deck-count">0</span></span>
        <span>🪦 <span id="player-grave-count">0</span></span>
        <span>💎 <span id="player-mana-count">0</span>/<span id="player-mana-total">0</span></span>
      </div>
    </div>
  </div>

</div>

<script>
// ===================================================
//  カード定義（10種 x 計40枚）
// ===================================================
const CARD_TYPES = [
  { id:1,  name:'スライム',      atk: 200, cost:1, color:'#2a7a9a' },
  { id:2,  name:'ゴブリン',      atk: 300, cost:1, color:'#2a7a3a' },
  { id:3,  name:'コボルト',      atk: 500, cost:2, color:'#8a6a2a' },
  { id:4,  name:'オーク',        atk: 600, cost:2, color:'#4a7a4a' },
  { id:5,  name:'リザードマン',  atk: 800, cost:3, color:'#4a6a1a' },
  { id:6,  name:'ドワーフ戦士',  atk: 900, cost:3, color:'#5a5a6a' },
  { id:7,  name:'オーガ',        atk:1100, cost:4, color:'#8a2a2a' },
  { id:8,  name:'ドラゴンナイト',atk:1200, cost:4, color:'#5a2a9a' },
  { id:9,  name:'フェニックス',  atk:1400, cost:5, color:'#9a3a1a' },
  { id:10, name:'ドラゴン',      atk:1500, cost:5, color:'#8a1a1a' },
];
// 各種類の枚数（合計40）
const DECK_COUNTS = [6, 6, 5, 5, 5, 4, 4, 3, 1, 1];

let _uid = 0;

// 山札を作成してシャッフル
function buildDeck() {
  const deck = [];
  CARD_TYPES.forEach((card, i) => {
    for (let j = 0; j < DECK_COUNTS[i]; j++) {
      deck.push({ ...card, uid: _uid++ });
    }
  });
  return shuffle(deck);
}

// Fisher-Yatesシャッフル
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===================================================
//  ゲーム状態
// ===================================================
let G = {};

// 残りマナを計算
function getAvailableMana(who) {
  return G[who].manaZone.length - G[who].manaUsed;
}

// 山札からドロー（失敗したらfalse）
function drawCard(who) {
  if (G[who].deck.length === 0) return false;
  G[who].hand.push(G[who].deck.pop());
  return true;
}

// ログ追加（最新5件表示）
function addLog(msg) {
  G.log.unshift(msg);
  if (G.log.length > 30) G.log.pop();
}

// ===================================================
//  ゲーム初期化
// ===================================================
function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  _uid = 0;

  // 先攻をランダム決定
  const first = Math.random() < 0.5 ? 'player' : 'cpu';

  G = {
    turn: 1,
    currentPlayer: first,
    phase: 'main',
    selectedHandUid: null,   // 手札で選択中のカードUID
    selectedAttackerUid: null, // 攻撃側に選択中のモンスターUID
    attackedUids: [],          // このターンに攻撃済みのUID一覧
    playerFirstTurnDone: false, // プレイヤーが最初のターンを終えたか（ボタン制御用）
    cpuFirstTurnDone: false,    // CPUが最初のターンを終えたか（攻撃スキップ制御用）
    completedTurns: 0,          // 両者合計のターン完了数（3以上で勝敗判定を有効化）
    log: [],
    player: {
      deck: buildDeck(),
      hand: [], battlefield: [], manaZone: [], graveyard: [],
      manaUsed: 0,
    },
    cpu: {
      deck: buildDeck(),
      hand: [], battlefield: [], manaZone: [], graveyard: [],
      manaUsed: 0,
    },
  };

  // 初期手札5枚ずつ
  for (let i = 0; i < 5; i++) {
    drawCard('player');
    drawCard('cpu');
  }

  // ターン開始時のドロー
  drawCard(first);

  addLog(`🎲 先攻: ${first === 'player' ? 'あなた' : 'CPU'}！`);
  addLog(`${first === 'player' ? 'あなた' : 'CPU'}がカードをドロー`);

  render();
  showTurnBanner(first === 'player' ? 'あなたのターン！' : 'CPUのターン！');

  if (first === 'cpu') {
    setTimeout(cpuTurn, 1800);
  }
}

// ===================================================
//  プレイヤー操作
// ===================================================

// 手札のカードを選択
function clickHandCard(uid) {
  if (G.currentPlayer !== 'player' || G.phase !== 'main') return;
  G.selectedHandUid = (G.selectedHandUid === uid) ? null : uid;
  G.selectedAttackerUid = null;
  render();
}

// 戦場のカードをクリック
function clickBattleCard(uid, who) {
  if (G.currentPlayer !== 'player') return;

  if (G.phase === 'battle') {
    if (who === 'player') {
      // 自分のモンスターを攻撃者に選択
      if (G.attackedUids.includes(uid)) return;
      G.selectedAttackerUid = uid;
      addLog('攻撃対象を選択（CPU側モンスターをクリック）');
      render();
    } else if (who === 'cpu') {
      // 攻撃先を選択 → 戦闘解決
      if (G.selectedAttackerUid === null) {
        addLog('⚠️ 先に自分のモンスターを選択してください');
        return;
      }
      resolveAttack('player', G.selectedAttackerUid, uid);
    }
  }
}

// マナにセット
function doSetMana() {
  if (!G.selectedHandUid) return;
  const idx = G.player.hand.findIndex(c => c.uid === G.selectedHandUid);
  if (idx === -1) return;
  const card = G.player.hand.splice(idx, 1)[0];
  G.player.manaZone.push(card);
  addLog(`💎 ${card.name}をマナにセット（合計: ${G.player.manaZone.length}）`);
  G.selectedHandUid = null;
  render();
}

// 召喚
function doSummon() {
  if (!G.selectedHandUid) return;
  const card = G.player.hand.find(c => c.uid === G.selectedHandUid);
  if (!card) return;

  const avail = getAvailableMana('player');
  if (avail < card.cost) {
    addLog(`⚠️ マナ不足！（必要: ${card.cost} / 残り: ${avail}）`);
    return;
  }

  const idx = G.player.hand.findIndex(c => c.uid === G.selectedHandUid);
  G.player.hand.splice(idx, 1);
  G.player.battlefield.push({ ...card });
  G.player.manaUsed += card.cost;
  addLog(`✨ ${card.name}（ATK:${card.atk}）を召喚！`);
  G.selectedHandUid = null;
  render();
}

// 攻撃フェーズへ移行
function doBattlePhase() {
  if (G.currentPlayer !== 'player' || G.phase !== 'main') return;
  G.phase = 'battle';
  G.selectedHandUid = null;
  addLog('⚔️ 攻撃フェーズ！（自分のモンスターを選んで攻撃）');
  render();
}

// ターン終了（1ターン目はメインフェーズから直接終了可能、2ターン目以降は攻撃フェーズから）
function doEndTurn() {
  if (G.currentPlayer !== 'player') return;
  // 1ターン目はメインフェーズからでも終了OK、2ターン目以降は攻撃フェーズ必須
  if (G.playerFirstTurnDone && G.phase !== 'battle') return;
  G.playerFirstTurnDone = true; // プレイヤーの初回ターン完了を記録
  G.completedTurns++;           // ターン完了数をカウント
  if (checkWinCondition()) return;
  switchTurn('cpu');
}

// ===================================================
//  勝敗判定（ターン終了時に呼ぶ）
// ===================================================
function checkWinCondition() {
  // 両者合計3ターン未満（＝お互いの1ターン目が終わっていない）は判定しない
  // 先攻がプレイヤー: P1(1)→C1(2)→P2(3) でP2終了後から有効
  // 先攻がCPU     : C1(1)→P1(2)→C2(3) でC2終了後から有効
  if (G.completedTurns < 3) return false;

  const pCount = G.player.battlefield.length;
  const cCount = G.cpu.battlefield.length;

  if (pCount === 0 && cCount === 0) {
    showResult('引き分け！🤝', '両者のモンスターが全滅した');
    return true;
  }
  if (cCount === 0) {
    showResult('あなたの勝利！🎉', 'CPUのモンスターをすべて倒した！');
    return true;
  }
  if (pCount === 0) {
    showResult('CPUの勝利…😢', 'あなたのモンスターがすべて倒された');
    return true;
  }
  return false;
}

function showResult(title, sub) {
  document.getElementById('result-text').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('overlay').style.display = 'flex';
}

// ===================================================
//  戦闘処理（共通）
// ===================================================
function resolveAttack(attackerWho, attackerUid, targetUid) {
  const defenderWho = attackerWho === 'player' ? 'cpu' : 'player';
  const aBF = G[attackerWho].battlefield;
  const dBF = G[defenderWho].battlefield;

  const ai = aBF.findIndex(c => c.uid === attackerUid);
  const di = dBF.findIndex(c => c.uid === targetUid);
  if (ai === -1 || di === -1) return;

  const atk = aBF[ai];
  const def = dBF[di];

  addLog(`⚔️ ${atk.name}(${atk.atk}) → ${def.name}(${def.atk})`);

  if (atk.atk > def.atk) {
    dBF.splice(di, 1);
    G[defenderWho].graveyard.push(def);
    addLog(`💥 ${def.name}が墓地へ！`);
  } else if (atk.atk < def.atk) {
    aBF.splice(ai, 1);
    G[attackerWho].graveyard.push(atk);
    addLog(`💥 ${atk.name}が墓地へ！`);
  } else {
    dBF.splice(di, 1);
    aBF.splice(ai, 1);
    G[defenderWho].graveyard.push(def);
    G[attackerWho].graveyard.push(atk);
    addLog(`💥 相打ち！両方墓地へ！`);
  }

  G.attackedUids.push(attackerUid);
  G.selectedAttackerUid = null;
  render();
}

// ===================================================
//  ターン切り替え
// ===================================================
function switchTurn(who) {
  G.currentPlayer = who;
  if (who === 'player') G.turn++;
  G.phase = 'main';
  G.selectedHandUid = null;
  G.selectedAttackerUid = null;
  G.attackedUids = [];
  G[who].manaUsed = 0;

  const name = who === 'player' ? 'あなた' : 'CPU';
  addLog(`─── ターン${G.turn}: ${name}のターン ───`);

  if (!drawCard(who)) {
    addLog(`${name}の山札が切れた！`);
  } else {
    addLog(`${name}がカードをドロー`);
  }

  render();
  showTurnBanner(who === 'player' ? 'あなたのターン！' : 'CPUのターン！');

  if (who === 'cpu') {
    setTimeout(cpuTurn, 1800);
  }
}

// ターンバナーを一瞬表示
function showTurnBanner(text) {
  const el = document.getElementById('turn-banner');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 1200);
}

// ===================================================
//  CPU AI
// ===================================================
function cpuTurn() {
  cpuMainPhase();
  setTimeout(() => {
    cpuBattlePhase();
    setTimeout(() => {
      G.cpuFirstTurnDone = true; // CPUの初回ターン完了を記録
      G.completedTurns++;        // ターン完了数をカウント
      if (!checkWinCondition()) {
        switchTurn('player');
      }
    }, 800);
  }, 1200);
}

// CPU メインフェーズ：マナセット → 召喚
function cpuMainPhase() {
  const cpu = G.cpu;

  // ── マナセット：手札の最強カードを出すために必要な枚数だけセット ──
  if (cpu.hand.length > 0) {
    const currentMana  = cpu.manaZone.length;

    // 手札で最もATKの高いカードのコストを目標にする
    const targetCard   = [...cpu.hand].sort((a, b) => b.atk - a.atk)[0];
    const deficit      = targetCard.cost - currentMana; // 不足マナ数

    // 最低1枚はセット（将来のために貯める）、最大で手札の半分まで
    const setCount = Math.min(
      Math.max(1, deficit),
      Math.ceil(cpu.hand.length / 2)
    );

    // ATK昇順で弱いカードからマナにセット（強いカードは召喚用に残す）
    for (let i = 0; i < setCount; i++) {
      if (cpu.hand.length === 0) break;
      const weakest = [...cpu.hand].sort((a, b) => a.atk - b.atk)[0];
      cpu.hand.splice(cpu.hand.findIndex(c => c.uid === weakest.uid), 1);
      cpu.manaZone.push(weakest);
      addLog(`CPU: 💎 ${weakest.name}をマナにセット（合計: ${cpu.manaZone.length}）`);
    }
  }

  // ── 召喚：マナの許す限り最強カードを繰り返し召喚 ──
  let loop = true;
  while (loop) {
    loop = false;
    const avail = getAvailableMana('cpu');
    const opts  = cpu.hand.filter(c => c.cost <= avail).sort((a, b) => b.atk - a.atk);
    if (opts.length > 0) {
      const card = opts[0];
      cpu.hand.splice(cpu.hand.findIndex(c => c.uid === card.uid), 1);
      cpu.battlefield.push({ ...card });
      cpu.manaUsed += card.cost;
      addLog(`CPU: ✨ ${card.name}（ATK:${card.atk}）を召喚！`);
      loop = true;
    }
  }

  render();
}

// CPU 攻撃フェーズ：各モンスターで一番弱いプレイヤーモンスターを攻撃
function cpuBattlePhase() {
  G.phase = 'battle';
  // 1ターン目はCPUも攻撃しない
  if (!G.cpuFirstTurnDone) {
    addLog('CPU: 1ターン目のため攻撃スキップ');
    return;
  }
  addLog('CPU: ⚔️ 攻撃フェーズ');

  // モンスターの強い順に攻撃判断
  const attackers = [...G.cpu.battlefield].sort((a, b) => b.atk - a.atk);
  for (const atk of attackers) {
    if (G.player.battlefield.length === 0) break;
    if (G.attackedUids.includes(atk.uid)) continue;

    // 自分より弱い相手（確実に倒せる）を探す
    const beatable = [...G.player.battlefield]
      .filter(t => t.atk < atk.atk)
      .sort((a, b) => b.atk - a.atk); // 倒せる中で最強を優先（効率よく削る）

    // 勝てる相手がいなければ攻撃しない（自滅を避ける）
    if (beatable.length === 0) {
      addLog(`CPU: ${atk.name}は勝てる相手がいないため攻撃をスキップ`);
      continue;
    }

    resolveAttack('cpu', atk.uid, beatable[0].uid);
  }

  render();
}

// ===================================================
//  描画（render）
// ===================================================
function render() {
  renderZone('cpu-hand',         G.cpu.hand,         'cpu',    true);
  renderZone('cpu-mana',         G.cpu.manaZone,     'cpu',    true);
  renderZone('cpu-battlefield',  G.cpu.battlefield,  'cpu',    false);
  renderZone('player-battlefield', G.player.battlefield, 'player', false);
  renderZone('player-mana',      G.player.manaZone,  'player', false);
  renderZone('player-hand',      G.player.hand,      'player', false);

  // 統計表示
  document.getElementById('cpu-deck-count').textContent  = G.cpu.deck.length;
  document.getElementById('cpu-grave-count').textContent = G.cpu.graveyard.length;
  document.getElementById('cpu-mana-count').textContent  = getAvailableMana('cpu');
  document.getElementById('cpu-mana-total').textContent  = G.cpu.manaZone.length;

  document.getElementById('player-deck-count').textContent  = G.player.deck.length;
  document.getElementById('player-grave-count').textContent = G.player.graveyard.length;
  document.getElementById('player-mana-count').textContent  = getAvailableMana('player');
  document.getElementById('player-mana-total').textContent  = G.player.manaZone.length;

  // フェーズ表示
  const isPlayer = G.currentPlayer === 'player';
  const phaseName = G.phase === 'main' ? 'メインフェーズ' : '攻撃フェーズ';
  const badgeClass = isPlayer ? (G.phase === 'main' ? 'badge-main' : 'badge-battle') : 'badge-cpu';
  const who = isPlayer ? '🧙 あなた' : '🤖 CPU';
  document.getElementById('phase-display').innerHTML =
    `ターン ${G.turn} ｜ ${who} <span class="phase-badge ${badgeClass}">${phaseName}</span>`;

  // ログ表示（最新5件）
  document.getElementById('game-log').innerHTML =
    G.log.slice(0, 5).map(l => `<div>${l}</div>`).join('');

  // ボタン有効化
  const isMain   = G.phase === 'main';
  const isBattle = G.phase === 'battle';
  const hasSel   = G.selectedHandUid !== null;

  document.getElementById('btn-mana').disabled    = !(isPlayer && isMain && hasSel);
  document.getElementById('btn-summon').disabled  = !(isPlayer && isMain && hasSel);
  const isFirstRound = !G.playerFirstTurnDone;
  // 1ターン目は攻撃フェーズボタンを無効化
  document.getElementById('btn-battle').disabled  = !(isPlayer && isMain && !isFirstRound);
  // 1ターン目はメインフェーズからでもターン終了可能
  document.getElementById('btn-end').disabled     = !(isPlayer && (isBattle || (isMain && isFirstRound)));
}

// ゾーンを描画
function renderZone(zoneId, cards, who, faceDown) {
  const el = document.getElementById(zoneId);
  el.innerHTML = '';

  if (cards.length === 0) {
    const e = document.createElement('div');
    e.className = 'zone-empty';
    e.textContent = '（空）';
    el.appendChild(e);
    return;
  }

  for (const card of cards) {
    const div = document.createElement('div');
    div.className = 'card';

    if (faceDown) {
      div.classList.add('face-down');
      div.innerHTML = '<div class="card-back-icon">🂠</div>';
    } else {
      div.style.background = `linear-gradient(160deg, ${card.color}, ${darken(card.color)})`;

      // 選択状態
      if (card.uid === G.selectedHandUid)     div.classList.add('selected');
      if (card.uid === G.selectedAttackerUid) div.classList.add('selected');

      // 攻撃可能ハイライト
      if (who === 'player' && G.phase === 'battle' && G.currentPlayer === 'player'
          && zoneId === 'player-battlefield' && !G.attackedUids.includes(card.uid)) {
        div.classList.add('can-attack');
      }

      div.innerHTML = `
        <span class="card-cost">💎${card.cost}</span>
        <div class="card-name">${card.name}</div>
        <div class="card-atk">${card.atk}</div>
        <div class="card-atk-label">ATK</div>
      `;

      // クリックハンドラ
      if (who === 'player' && zoneId === 'player-hand') {
        div.onclick = () => clickHandCard(card.uid);
      } else if (zoneId.includes('battlefield')) {
        div.onclick = () => clickBattleCard(card.uid, who);
      }
    }

    el.appendChild(div);
  }
}

// カラーを少し暗くする（グラデーション用）
function darken(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`;
}
